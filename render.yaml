services:
  - type: web
    name: emba-professional-web
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_SSL
        value: true
      - key: AUTO_BACKUP_HOURS
        value: 24
